name: Build APK & AAB

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Génère les fichiers plateforme manquants (android/, etc.)
      - name: Flutter create (platform files)
        run: flutter create . --org com.rafael.pocketagent --platforms android --project-name pocket_agent

      # S'assure que le manifest a bien INTERNET + cleartext (Ollama local)
      - name: Patch AndroidManifest
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' $M || sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET"/>\n    <application|' $M
          grep -q 'usesCleartextTraffic' $M || sed -i 's|<application|<application android:usesCleartextTraffic="true"|' $M
          sed -i 's|android:label="[^"]*"|android:label="PocketAgent"|' $M
          cat $M

      - name: Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle (Play Store)
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: PocketAgent-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: PocketAgent-AAB
          path: build/app/outputs/bundle/release/app-release.aab
